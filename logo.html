<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo - Barbearia do Jé</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        background: #22252b;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 40px 20px;
      }

      .instrucao {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.95em;
        text-align: center;
        max-width: 500px;
        line-height: 1.5;
      }

      /* Cartao quadrado da logo - tire um print desta area */
      .logo-card {
        width: 500px;
        height: 500px;
        max-width: 90vw;
        max-height: 90vw;
        border-radius: 24px;
        background: radial-gradient(circle at 50% 35%, #1f3a5f 0%, #16213e 55%, #0d1321 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        position: relative;
        overflow: hidden;
      }

      /* Poste de barbeiro decorativo nas laterais */
      .barber-pole {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 14px;
        background: repeating-linear-gradient(
          45deg,
          #e60023 0 10px,
          #ffffff 10px 20px,
          #0f3460 20px 30px,
          #ffffff 30px 40px
        );
        opacity: 0.85;
      }
      .barber-pole.left {
        left: 0;
      }
      .barber-pole.right {
        right: 0;
      }

      .logo-foto {
        width: 210px;
        height: 210px;
        border-radius: 50%;
        object-fit: cover;
        object-position: center top;
        border: 5px solid #ffd700;
        box-shadow: 0 10px 35px rgba(184, 134, 11, 0.6);
      }

      .logo-nome {
        font-size: 2.4em;
        font-weight: 800;
        letter-spacing: 2px;
        text-align: center;
        line-height: 1.1;
        background: linear-gradient(135deg, #b8860b 0%, #ffd700 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .logo-sub {
        color: rgba(255, 255, 255, 0.85);
        font-size: 1em;
        letter-spacing: 4px;
        font-weight: 300;
      }
    </style>
  </head>
  <body>
    <p class="instrucao">
      👇 Tire um print (recorte) apenas do cartão abaixo e use como logo no
      Google Maps. O quadrado já está no formato certo (recomendado 500×500).
    </p>

    <div class="logo-card">
      <div class="barber-pole left"></div>
      <div class="barber-pole right"></div>

      <img src="images/je.jpg" alt="Foto do Jé" class="logo-foto" />
      <div class="logo-nome">BARBEARIA<br />DO JÉ</div>
      <div class="logo-sub">✂ CORTES PREMIUM ✂</div>
    </div>
  </body>
</html>
